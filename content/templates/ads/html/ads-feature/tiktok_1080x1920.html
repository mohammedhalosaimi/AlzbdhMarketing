<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;width:1080px;height:1920px;overflow:hidden}
    body{background:#102318}
    .poster{position:relative;width:100%;height:100%;overflow:hidden;background:
      radial-gradient(circle at 16% 74%, color-mix(in srgb, #E8C46B 32%, transparent), transparent 24%),
      radial-gradient(circle at 88% 18%, rgba(121,184,168,.32), transparent 24%),
      linear-gradient(135deg,#102318 0%,#163f35 46%,#0c1711 100%)}
    .poster:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(253,251,247,.08),transparent 34%,rgba(0,0,0,.18));opacity:.72}
    .top{position:absolute;z-index:4;top:54px;left:50px;right:50px;display:flex;align-items:center;justify-content:space-between}
    .top img{width:126px}.site{direction:ltr;color:#FDFBF7;font:800 23px system-ui,sans-serif;text-shadow:0 5px 18px rgba(0,0,0,.45)}
    .photo-frame{position:absolute;z-index:2;overflow:hidden;border-radius:8px;border:2px solid rgba(253,251,247,.18);background:linear-gradient(135deg,rgba(253,251,247,.16),rgba(253,251,247,.04));box-shadow:0 30px 80px rgba(0,0,0,.32)}
    .photo-frame:before{content:"";position:absolute;inset:18px;border-radius:6px;border:2px dashed rgba(253,251,247,.16)}
    .photo-frame:after{content:"";position:absolute;left:28px;right:28px;bottom:28px;height:8px;border-radius:999px;background:#E8C46B;opacity:.72}
    .layout-score .photo-frame,.layout-split .photo-frame,.layout-product .photo-frame{top:172px;left:64px;right:64px;height:760px}
    .layout-ad .photo-frame{top:172px;left:70px;right:70px;height:650px}
    .plate{position:absolute;z-index:3;border-radius:8px;background:rgba(16,35,24,.86);border:1px solid color-mix(in srgb, #E8C46B 55%, transparent);box-shadow:0 28px 70px rgba(0,0,0,.34)}
    .layout-score .plate,.layout-split .plate,.layout-product .plate{left:54px;right:54px;bottom:88px;height:610px}
    .layout-ad .plate{left:56px;right:56px;bottom:88px;height:540px}
    .arc{position:absolute;z-index:1;left:42px;bottom:44px;width:220px;height:220px;border:22px solid color-mix(in srgb, #E8C46B 55%, transparent);border-radius:50%;opacity:.48}
  </style>
</head>
<body>
  <main class="poster layout-ad">
    <div class="top"><div class="site">app.alzbdh.com</div><img src="../../../../../brand/logos/logo-white.svg" alt=""></div>
    <div class="photo-frame"></div>
    <div class="plate"></div>
    <div class="arc"></div>
  </main>
</body>
</html>
