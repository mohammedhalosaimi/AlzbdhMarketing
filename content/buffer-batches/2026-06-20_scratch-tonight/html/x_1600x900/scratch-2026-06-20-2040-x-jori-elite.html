<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <style>
    @font-face{font-family:Changa;font-weight:400;src:url("../../../../travel/assets/fonts/Changa-400.ttf") format("truetype");font-display:block}
    @font-face{font-family:Changa;font-weight:700;src:url("../../../../travel/assets/fonts/Changa-700.ttf") format("truetype");font-display:block}
    @font-face{font-family:Changa;font-weight:800;src:url("../../../../travel/assets/fonts/Changa-800.ttf") format("truetype");font-display:block}
    *{box-sizing:border-box}
    html,body{margin:0;width:1600px;height:900px;overflow:hidden}
    body{font-family:Changa,system-ui,sans-serif;background:#102318;color:#FDFBF7}
    .poster{position:relative;width:100%;height:100%;overflow:hidden;background:#102318}
    .photo{position:absolute;inset:0;background-image:linear-gradient(180deg,rgba(5,14,9,.18),rgba(5,14,9,.30) 38%,rgba(5,14,9,.82)),linear-gradient(90deg,rgba(16,35,24,.72),rgba(16,35,24,.20) 48%,rgba(16,35,24,.78)),url("../../../../monthly-batch/2026-07-06_to_2026-08-04/assets/source-images/place/ChIJY9xjgOhV4xURCoz4rIbIDHY.jpg");background-size:cover;background-position:center;filter:saturate(1.05) contrast(1.03)}
    .top{position:absolute;z-index:2;top:44px;left:66px;right:66px;display:flex;align-items:center;justify-content:space-between}
    .top img{width:146px;filter:drop-shadow(0 4px 18px rgba(0,0,0,.48))}
    .site{direction:ltr;font-size:24px;font-weight:800;text-shadow:0 5px 18px rgba(0,0,0,.55)}
    .content{position:absolute;z-index:2;left:72px;right:72px;bottom:56px;display:grid;grid-template-columns:1fr 1fr;gap:34px;align-items:end}
    .panel{border-radius:8px;background:rgba(16,35,24,.76);border:1px solid rgba(232,196,107,.54);box-shadow:0 28px 70px rgba(0,0,0,.34);padding:30px 36px;backdrop-filter:blur(2px)}
    .label{display:inline-flex;border-radius:999px;background:rgba(232,196,107,.16);border:1px solid rgba(232,196,107,.56);color:#E8C46B;padding:8px 16px;font-size:23px;font-weight:800}
    h1{margin:18px 0 8px;font-size:72px;line-height:1.08;font-weight:800;letter-spacing:0;text-shadow:0 8px 30px rgba(0,0,0,.55);max-height:166px;overflow:hidden}
    .subtitle{font-size:30px;line-height:1.24;font-weight:800;color:#E8C46B;margin-bottom:12px;max-height:82px;overflow:hidden}
    .body{font-size:27px;line-height:1.46;font-weight:700;color:#F4EFE6;max-height:170px;overflow:hidden}
    .cta{display:inline-flex;margin-top:22px;background:#E8C46B;color:#102318;border-radius:8px;padding:12px 19px;font-size:24px;font-weight:800}
    .side{display:block;align-self:stretch;border-radius:8px;border:1px solid rgba(232,196,107,.24);background:linear-gradient(135deg,rgba(253,251,247,.10),rgba(16,35,24,.18));min-height:292px;position:relative;overflow:hidden}
    .side:before{content:"";position:absolute;left:42px;bottom:42px;width:210px;height:210px;border:26px solid rgba(232,196,107,.28);border-radius:50%}
    .side:after{content:"";position:absolute;left:42px;right:42px;bottom:34px;height:8px;border-radius:999px;background:#E8C46B}
    .arc{position:absolute;z-index:1;left:70px;bottom:48px;width:250px;height:250px;border:22px solid rgba(232,196,107,.36);border-radius:50%;opacity:.62}
  </style>
</head>
<body>
  <main class="poster">
    <div class="photo"></div>
    <div class="arc"></div>
    <div class="top"><div class="site">app.alzbdh.com</div><img src="../../../../../brand/logos/logo-white.svg" alt="الزبدة"></div>
    <section class="content">
      <div class="panel">
        <div class="label">زبدة الأماكن</div>
        <h1>مطعم جوري ايليت</h1>
        <div class="subtitle">مكان قرار، مو بس صورة.</div>
        <div class="body">إذا بتروح مع ناس، الزبدة تساعدك تعرف الطبق الأقوى والملاحظة الأهم قبل ما تحجز.</div>
        <div class="cta">خذ الخلاصة</div>
      </div>
      <div class="side"></div>
    </section>
  </main>
</body>
</html>
