<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <style>
    @font-face{font-family:Changa;font-weight:400;src:url("../../../../travel/assets/fonts/Changa-400.ttf") format("truetype");font-display:block}
    @font-face{font-family:Changa;font-weight:700;src:url("../../../../travel/assets/fonts/Changa-700.ttf") format("truetype");font-display:block}
    @font-face{font-family:Changa;font-weight:800;src:url("../../../../travel/assets/fonts/Changa-800.ttf") format("truetype");font-display:block}
    *{box-sizing:border-box}
    html,body{margin:0;width:1080px;height:1920px;overflow:hidden}
    body{font-family:Changa,system-ui,sans-serif;background:#102318;color:#FDFBF7}
    .poster{position:relative;width:100%;height:100%;overflow:hidden;background:#102318 url("../../../../templates/perfumes/images/perfumes-notes/tiktok_1080x1920.png") center/cover no-repeat}

    .photo{position:absolute;z-index:2;overflow:hidden;border-radius:6px;background-image:url("../../../../monthly-batch/2026-07-06_to_2026-08-04/assets/source-images/perfume/zoologist-perfumes-rabbit-91167.jpg");background-size:contain;background-position:center;background-repeat:no-repeat;filter:saturate(1.04) contrast(1.04)}
    .photo:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,14,9,.02),rgba(5,14,9,.24))}
    .photo{top:194px;left:86px;right:86px;height:716px}

    .top{position:absolute;z-index:3;top:54px;left:50px;right:50px;display:flex;align-items:center;justify-content:space-between}
    .top img{width:126px}.site{direction:ltr;font-size:23px;font-weight:800;text-shadow:0 5px 18px rgba(0,0,0,.45)}
    .panel{position:absolute;z-index:2;border-radius:8px;background:rgba(16,35,24,.84);border:1px solid color-mix(in srgb, #E8C46B 55%, transparent);box-shadow:0 28px 70px rgba(0,0,0,.34)}

    .panel{background:transparent;border:0;box-shadow:none}
    .panel{left:54px;right:54px;bottom:88px;height:610px;padding:38px 36px}

    .eyebrow{display:inline-flex;align-items:center;border-radius:999px;background:color-mix(in srgb, #E8C46B 18%, transparent);border:1px solid color-mix(in srgb, #E8C46B 55%, transparent);color:#E8C46B;padding:8px 16px;font-size:24px;font-weight:800}
    .title{margin:18px 0 10px;font-size:74px;line-height:1.08;font-weight:800;letter-spacing:0;color:#FDFBF7;text-shadow:0 8px 30px rgba(0,0,0,.45);max-height:236px;overflow:hidden}
    .subtitle{font-size:31px;line-height:1.25;font-weight:800;color:#E8C46B;margin-bottom:12px;max-height:96px;overflow:hidden}
    .body{margin:0;font-size:30px;line-height:1.48;font-weight:700;color:#F4EFE6;max-height:300px;overflow:hidden}
    .cta{display:inline-flex;margin-top:22px;background:#E8C46B;color:#102318;border-radius:8px;padding:12px 19px;font-size:25px;font-weight:800}
    .badge{position:absolute;z-index:2;top:188px;right:54px;background:#FDFBF7;color:#102318;border-radius:8px;padding:13px 17px;font-size:27px;font-weight:800;box-shadow:0 16px 45px rgba(0,0,0,.24)}
    .mark{position:absolute;z-index:1;left:42px;bottom:44px;width:220px;height:220px;border:22px solid color-mix(in srgb, #E8C46B 55%, transparent);border-radius:50%;opacity:.48}
  </style>
</head>
<body>
  <main class="poster layout-product">
    <div class="photo"></div>



    <section class="panel">
      <div class="eyebrow">زبدة العطور</div>
      <h1 class="title">رابيت</h1>
      <div class="subtitle">زولوجيست بيرفيومز</div>
      <p class="body">تفاح أخضر وبرغموت مع قرفة دافئة وأوراق خضراء. الانطباع مرح وطبيعي بدون وصف تسويقي طويل.</p>
      <div class="cta">خذ زبدة العطر</div>
    </section>
  </main>
</body>
</html>
