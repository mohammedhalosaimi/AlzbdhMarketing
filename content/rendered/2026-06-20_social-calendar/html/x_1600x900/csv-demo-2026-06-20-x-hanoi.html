<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <style>
    @font-face{font-family:Changa;font-weight:400;src:url("../../../../travel/assets/fonts/Changa-400.ttf") format("truetype");font-display:block}
    @font-face{font-family:Changa;font-weight:700;src:url("../../../../travel/assets/fonts/Changa-700.ttf") format("truetype");font-display:block}
    @font-face{font-family:Changa;font-weight:800;src:url("../../../../travel/assets/fonts/Changa-800.ttf") format("truetype");font-display:block}
    *{box-sizing:border-box}
    html,body{margin:0;width:1600px;height:900px;overflow:hidden}
    body{font-family:Changa,system-ui,sans-serif;background:#102318;color:#FDFBF7}
    .poster{position:relative;width:100%;height:100%;overflow:hidden;background:#102318}
    .photo{position:absolute;inset:0;background-image:linear-gradient(180deg,rgba(5,14,9,.16),rgba(5,14,9,.56) 54%,rgba(5,14,9,.92)),url("../../../../monthly-batch/2026-07-06_to_2026-08-04/assets/source-images/destination/hanoi.jpg");background-size:cover;background-position:center;background-repeat:no-repeat;filter:saturate(1.04) contrast(1.04)}
    .photo:after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(16,35,24,.92),rgba(16,35,24,.58) 42%,rgba(16,35,24,.24))}
    .top{position:absolute;z-index:3;top:44px;left:66px;right:66px;display:flex;align-items:center;justify-content:space-between}
    .top img{width:145px}.site{direction:ltr;font-size:24px;font-weight:800;text-shadow:0 5px 18px rgba(0,0,0,.45)}
    .panel{position:absolute;z-index:2;border-radius:8px;background:rgba(16,35,24,.84);border:1px solid color-mix(in srgb, #E8C46B 55%, transparent);box-shadow:0 28px 70px rgba(0,0,0,.34)}
    .layout-score .panel{left:72px;right:520px;bottom:64px;padding:34px 38px}
    .layout-split .panel{left:72px;right:420px;bottom:64px;padding:32px 38px}
    .layout-product .panel{left:74px;right:560px;bottom:64px;padding:32px 38px}
    .layout-ad .panel{left:90px;right:90px;bottom:70px;text-align:center;padding:34px 50px}
    .eyebrow{display:inline-flex;align-items:center;border-radius:999px;background:color-mix(in srgb, #E8C46B 18%, transparent);border:1px solid color-mix(in srgb, #E8C46B 55%, transparent);color:#E8C46B;padding:8px 16px;font-size:23px;font-weight:800}
    .title{margin:18px 0 10px;font-size:74px;line-height:1.08;font-weight:800;letter-spacing:0;color:#FDFBF7;text-shadow:0 8px 30px rgba(0,0,0,.45);max-height:172px;overflow:hidden}
    .subtitle{font-size:30px;line-height:1.25;font-weight:800;color:#E8C46B;margin-bottom:12px;max-height:78px;overflow:hidden}
    .body{margin:0;font-size:28px;line-height:1.48;font-weight:700;color:#F4EFE6;max-height:164px;overflow:hidden}
    .cta{display:inline-flex;margin-top:22px;background:#E8C46B;color:#102318;border-radius:8px;padding:12px 19px;font-size:24px;font-weight:800}
    .badge{position:absolute;z-index:2;top:150px;right:72px;background:#FDFBF7;color:#102318;border-radius:8px;padding:13px 17px;font-size:25px;font-weight:800;box-shadow:0 16px 45px rgba(0,0,0,.24)}
    .mark{position:absolute;z-index:1;left:76px;bottom:58px;width:260px;height:260px;border:22px solid color-mix(in srgb, #E8C46B 55%, transparent);border-radius:50%;opacity:.48}
  </style>
</head>
<body>
  <main class="poster layout-score">
    <div class="photo"></div>
    <div class="mark"></div>
    <div class="top"><div class="site">app.alzbdh.com</div><img src="../../../../../brand/logos/logo-white.svg" alt="الزبدة"></div>
    <div class="badge">destinations</div>
    <section class="panel">
      <div class="eyebrow">زبدة السفر</div>
      <h1 class="title">هانوي</h1>
      <div class="subtitle">خليج هالونج والحي القديم</div>
      <p class="body">وجهة تحتاج تخطيط هادي قبل الحجز. الزبدة تختصر لك أبرز ما يستاهل والوقت الأنسب للزيارة.</p>
      <div class="cta">خططها على الزبدة</div>
    </section>
  </main>
</body>
</html>
